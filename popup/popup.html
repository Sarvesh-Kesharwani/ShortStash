<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>ShortStash</title>
</head>
<body>
  <div class="popup-container">
    <div class="header">
      <img src="../icons/icon48.png" alt="ShortStash" class="logo">
      <h1>ShortStash</h1>
    </div>
    <p class="subtitle">Save & categorize your Shorts and Reels</p>
    <div class="toggle-row">
      <span class="toggle-label" id="statusLabel">Disabled</span>
      <label class="toggle-switch">
        <input type="checkbox" id="toggleExtension">
        <span class="slider"></span>
      </label>
    </div>
    <button class="library-btn" id="openLibrary">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      My Library
    </button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
