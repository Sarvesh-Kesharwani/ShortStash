<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>ShortStash</title>
</head>
<body>
  <div class="popup-container">
    <div class="header">
      <img src="../icons/icon48.png" alt="ShortStash" class="logo">
      <h1>ShortStash</h1>
    </div>
    <p class="subtitle">Save & categorize your Shorts and Reels</p>
    <div class="toggle-row">
      <span class="toggle-label" id="statusLabel">Disabled</span>
      <label class="toggle-switch">
        <input type="checkbox" id="toggleExtension">
        <span class="slider"></span>
      </label>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
